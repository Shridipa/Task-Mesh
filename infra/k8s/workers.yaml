apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskmesh-workers
  labels:
    app: taskmesh-workers
spec:
  replicas: 3
  selector:
    matchLabels:
      app: taskmesh-workers
  template:
    metadata:
      labels:
        app: taskmesh-workers
    spec:
      containers:
        - name: worker
          image: taskmesh/api:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "taskmesh.worker"]
          env:
            - name: REDIS_URL
              value: redis://taskmesh-redis:6379/0
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: taskmesh-workers
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: taskmesh-workers
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65

