apiVersion: v1
kind: Secret
metadata:
  name: taskmesh-db
type: Opaque
stringData:
  url: postgresql+psycopg://taskmesh:taskmesh@taskmesh-postgres:5432/taskmesh
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskmesh-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskmesh-redis
  template:
    metadata:
      labels:
        app: taskmesh-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: taskmesh-redis
spec:
  selector:
    app: taskmesh-redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskmesh-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskmesh-postgres
  template:
    metadata:
      labels:
        app: taskmesh-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: taskmesh
            - name: POSTGRES_PASSWORD
              value: taskmesh
            - name: POSTGRES_DB
              value: taskmesh
---
apiVersion: v1
kind: Service
metadata:
  name: taskmesh-postgres
spec:
  selector:
    app: taskmesh-postgres
  ports:
    - port: 5432
      targetPort: 5432

