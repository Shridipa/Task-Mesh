name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]" httpx pytest-cov
      - name: Lint
        run: ruff check .
      - name: Test with coverage
        env:
          WORKER_SECRET: ci-test-secret
          CORS_ORIGINS: "http://localhost:5173"
        run: pytest --cov=taskmesh --cov-report=term-missing --cov-fail-under=60

  docker:
    runs-on: ubuntu-latest
    needs: test
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t taskmesh/api:${{ github.sha }} .

      - name: Smoke-test container health
        run: |
          docker run -d --name taskmesh-smoke \
            --network host \
            -e DATABASE_URL=sqlite+aiosqlite:///tmp/test.db \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e WORKER_SECRET=smoke-secret \
            -e CORS_ORIGINS="*" \
            --entrypoint uvicorn \
            taskmesh/api:${{ github.sha }} \
            taskmesh.main:app --host 0.0.0.0 --port 8000

          echo "----- waiting for app to start -----"
          sleep 8

          echo "----- container status -----"
          docker ps -a --filter "name=taskmesh-smoke"

          echo "----- container logs -----"
          docker logs taskmesh-smoke

          echo "----- curl health check -----"
          curl -f http://localhost:8000/health

      - name: Cleanup
        if: always()
        run: docker stop taskmesh-smoke || true